spring.application.name=sistemaiglesia
# Conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/iglesia_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Permite que Spring cree las tablas automáticamente basadas en tus clases Java (Entities)
#spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (muy útil para depurar)
#spring.jpa.show-sql=true

# Formatea el SQL en la consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuración de Hibernate (El ORM)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

